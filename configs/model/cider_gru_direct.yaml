# DiMP-Rev2 One-Shot: Direct prediction without diffusion
# Uses DiMP backbone but as one-shot predictor (like baselines)

name: dimp_rev2_oneshot

# Architecture (matches dimp_rev2)
D_model: 128
num_layers: 4
heads: 4
mlp_ratio: 4
dropout: 0.1

# Slot responsibility parameters
tau_min: 0.2
slot_init_scale: 0.5
